<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anatomy of a Ransomware Attack</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --card-active: #111827;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-red: #ef4444;
      --accent-glow: rgba(239, 68, 68, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrapper { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 20px; }

    header { text-align: center; margin-bottom: 10px; }
    h1 { font-size: 1.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
    .subtitle { color: var(--text-muted); font-size: 0.95rem; max-width: 700px; margin: 0 auto; }

    .horizontal-accordion { display: flex; width: 100%; height: 540px; gap: 12px; overflow: hidden; }

    .panel {
      flex: 1;
      background-color: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      position: relative;
      transition: flex 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .panel.active { flex: 6; background-color: var(--card-active); border-color: var(--accent-red); cursor: default; }

    .panel-strip {
      width: 75px; min-width: 75px; height: 100%;
      display: flex; flex-direction: column; align-items: center; padding: 30px 0;
    }

    .panel-num { font-size: 1.2rem; font-weight: 700; color: var(--text-muted); margin-bottom: 40px; }
    .panel.active .panel-num { color: var(--accent-red); }

    .panel-label-container {
      position: absolute; bottom: 50px;
      transform: rotate(-90deg); transform-origin: left center; left: 50px;
    }
    .panel-label { font-size: 1.1rem; font-weight: 600; white-space: nowrap; }
    .panel.active .panel-label { opacity: 0; }

    .panel-body {
      flex: 1; padding: 40px; opacity: 0;
      transition: opacity 0.3s ease; display: flex; gap: 30px; align-items: center; visibility: hidden;
    }
    .panel.active .panel-body { opacity: 1; visibility: visible; transition-delay: 0.2s; }

    .panel-text-column { flex: 1; display: flex; flex-direction: column; gap: 16px; }
    
    /* ESTILO CORREGIDO PARA IMÁGENES */
    .panel-main-image-container {
      flex: 1;
      height: 350px; /* Altura fija uniforme */
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      background-color: transparent;
      padding: 10px;
    }

    .panel-main-image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; /* Muestra toda la imagen sin cortar */
    }

    .takeaway-box { background-color: rgba(239, 68, 68, 0.06); border-left: 4px solid var(--accent-red); padding: 14px; }
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <h1>Anatomy of a Ransomware Attack</h1>
      <p class="subtitle">Ransomware is a chain of silent, calculated events.</p>
    </header>

    <div class="horizontal-accordion">
      <div class="panel active">
        <div class="panel-strip">
          <span class="panel-num">01</span>
          <div class="panel-label-container"><span class="panel-label">Infiltration</span></div>
        </div>
        <div class="panel-body">
          <div class="panel-text-column">
            <h2>Infiltration</h2>
            <p>It starts with a harmless email...</p>
            <div class="takeaway-box"><strong>Key Takeaway:</strong> Phishing is the primary entry point.</div>
          </div>
          <div class="panel-main-image-container">
            <img src="https://i.imgur.com/ruKojo5.png" alt="Infiltration">
          </div>
        </div>
      </div>

      </div>
  </div>

  <script>
    const panels = document.querySelectorAll('.panel');
    panels.forEach(panel => {
      panel.addEventListener('click', () => {
        panels.forEach(p => p.classList.remove('active'));
        panel.classList.add('active');
      });
    });
  </script>
</body>
</html>
