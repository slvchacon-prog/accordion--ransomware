<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anatomy of a Ransomware Attack</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --card-active: #111827;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-red: #ef4444;
      --accent-glow: rgba(239, 68, 68, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .wrapper {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .horizontal-accordion {
      display: flex;
      width: 100%;
      height: 540px; 
      gap: 12px;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      background-color: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      position: relative;
      transition: flex 0.5s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.3s ease, border-color 0.3s ease;
    }

    .panel:hover:not(.active) {
      background-color: #273549;
      border-color: rgba(255, 255, 255, 0.1);
    }

    .panel.active {
      flex: 6; 
      background-color: var(--card-active);
      border-color: var(--accent-red);
      box-shadow: 0 10px 30px var(--accent-glow);
      cursor: default;
    }

    .panel-strip {
      width: 75px;
      min-width: 75px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 0;
      user-select: none;
      position: relative;
    }

    .panel-num {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: color 0.3s ease;
      margin-bottom: 40px;
    }

    .panel.active .panel-num {
      color: var(--accent-red);
    }

    .panel-mini-icon-container {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: auto; 
    }

    .panel-mini-icon-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .panel-label-container {
      position: absolute;
      bottom: 50px;
      width: 250px; 
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      transform: rotate(-90deg);
      transform-origin: left center;
      left: 50px;
    }

    .panel-label {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      letter-spacing: 0.05em;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    .panel.active .panel-label {
      opacity: 0; 
    }

    .panel-body {
      flex: 1;
      padding: 40px;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      display: flex;
      gap: 30px; 
      align-items: center;
      visibility: hidden;
    }

    .panel.active .panel-body {
      opacity: 1;
      transform: translateX(0);
      visibility: visible;
      transition-delay: 0.2s;
    }

    .panel-text-column {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .panel-text {
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .takeaway-box {
      background-color: rgba(239, 68, 68, 0.06);
      border-left: 4px solid var(--accent-red);
      padding: 14px 18px;
      border-radius: 0 8px 8px 0;
    }

    .takeaway-box p {
      color: #fca5a5;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.5;
    }

    .panel-main-image-container {
      flex: 1;
      height: 100%;
      max-height: 390px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background-color: rgba(255, 255, 255, 0.01);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-main-image-container img {
      width: 100%;
      height: 100%;
      object-fit: contain; 
    }

    @media (max-width: 900px) {
      .panel-body {
        flex-direction: column;
        overflow-y: auto;
        padding: 30px 24px;
      }
      .panel-main-image-container {
        width: 100%;
        min-height: 200px;
        flex: none;
      }
    }

    @media (max-width: 768px) {
      .horizontal-accordion {
        flex-direction: column;
        height: auto;
      }
      .panel {
        flex-direction: column;
        height: 80px;
        min-height: 80px;
      }
      .panel.active {
        flex: none;
        height: auto;
      }
      .panel-strip {
        flex-direction: row;
        width: 100%;
        height: 80px;
        padding: 0 24px;
      }
      .panel-num {
        margin-bottom: 0;
      }
      .panel-mini-icon-container {
        margin-bottom: 0;
        margin-left: 20px;
      }
      .panel-label-container {
        position: relative;
        transform: none;
        bottom: auto;
        left: auto;
        width: auto;
        height: auto;
        margin-left: auto;
      }
      .panel-label {
        opacity: 1 !important;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <h1>Anatomy of a Ransomware Attack</h1>
